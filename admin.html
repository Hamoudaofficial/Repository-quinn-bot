<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinn Bot — لوحة التحكم</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
/* ── Reset & Base ─── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --cyan:#00F5FF; --green:#00FF88;
  --red:#FF4757; --purple:#9B59B6; --pink:#FF6B9D;
  --bg0:#030712; --bg1:#080E1E; --bg2:#0D1424;
  --glass:rgba(255,255,255,.05); --border:rgba(255,255,255,.08);
  --text:#F0F4FF; --muted:rgba(255,255,255,.45);
  --r:16px;
}
html, body { height:100%; background:var(--bg0); color:var(--text); font-family:'Cairo',sans-serif; }
body { display:flex; flex-direction:column; min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(0,245,255,.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 90% 20%, rgba(255,215,0,.05) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(155,89,182,.05) 0%, transparent 70%);
}

/* ── Login Screen ─── */
#login-screen {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.login-box {
  width:100%; max-width:400px;
  background:rgba(10,15,30,.97);
  border:1px solid rgba(255,215,0,.2);
  border-radius:24px; padding:36px 28px;
  position:relative; z-index:1;
}
.login-box::before {
  content:''; position:absolute; inset:0; border-radius:24px;
  background:linear-gradient(135deg,rgba(255,215,0,.06) 0%,transparent 60%);
  pointer-events:none;
}
.login-logo {
  text-align:center; margin-bottom:28px;
}
.login-logo-icon {
  width:72px; height:72px; border-radius:50%; margin:0 auto 12px;
  background:radial-gradient(circle,rgba(255,215,0,.2),rgba(255,215,0,.04));
  border:2px solid rgba(255,215,0,.3);
  box-shadow:0 0 30px rgba(255,215,0,.15);
  display:flex; align-items:center; justify-content:center;
  font-size:30px; color:var(--gold);
}
.login-title { font-family:'Orbitron',sans-serif; font-size:22px; font-weight:900; color:var(--gold); letter-spacing:2px; }
.login-sub { font-size:12px; color:var(--muted); margin-top:4px; }
.login-label { font-size:13px; font-weight:700; color:var(--text); margin-bottom:8px; display:block; }
.login-input {
  width:100%; padding:13px 16px; border-radius:14px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  color:var(--text); font-size:15px; font-family:'Cairo',sans-serif; outline:none;
  transition:border .2s; margin-bottom:12px;
}
.login-input:focus { border-color:rgba(255,215,0,.4); }
.login-btn {
  width:100%; padding:14px; border-radius:14px; border:none;
  background:linear-gradient(135deg, var(--gold), #FFA500);
  color:#000; font-size:15px; font-weight:900;
  font-family:'Cairo',sans-serif; cursor:pointer;
  transition:all .2s; letter-spacing:.5px;
}
.login-btn:hover { box-shadow:0 4px 24px rgba(255,215,0,.3); }
.login-btn:active { transform:scale(.97); }
#login-error { color:var(--red); font-size:12px; font-weight:700; text-align:center; min-height:18px; margin-top:8px; }
.login-badge {
  display:flex; align-items:center; gap:8px; justify-content:center;
  font-size:11px; color:var(--muted); margin-top:20px;
  padding-top:16px; border-top:1px solid rgba(255,255,255,.06);
}

/* ── Dashboard ─── */
#dashboard { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }

/* Sidebar */
#sidebar {
  width:260px; position:fixed; top:0; right:0; bottom:0; z-index:50;
  background:rgba(6,10,22,.97);
  backdrop-filter:blur(20px);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateX(0); transition:transform .3s;
}
@media(max-width:800px) {
  #sidebar { transform:translateX(100%); }
  #sidebar.open { transform:translateX(0); }
  #main-content { margin-right:0 !important; }
}
.sidebar-header {
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.sidebar-logo {
  width:40px; height:40px; border-radius:12px;
  background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--gold);
}
.sidebar-title { font-family:'Orbitron',sans-serif; font-size:14px; font-weight:900; color:var(--gold); }
.sidebar-sub { font-size:10px; color:var(--muted); margin-top:1px; }
.sidebar-nav { padding:12px 8px; flex:1; overflow-y:auto; }
.nav-section-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; padding:8px 10px 4px; }
.sidebar-item {
  display:flex; align-items:center; gap:10px; padding:11px 12px;
  border-radius:12px; cursor:pointer; transition:.2s;
  font-size:13px; font-weight:700; color:var(--muted);
  margin-bottom:2px;
}
.sidebar-item:hover { background:rgba(255,255,255,.04); color:var(--text); }
.sidebar-item.active { background:rgba(255,215,0,.08); color:var(--gold); border:1px solid rgba(255,215,0,.12); }
.sidebar-item i { width:18px; text-align:center; font-size:15px; }
.sidebar-footer { padding:14px; border-top:1px solid var(--border); }
.logout-btn {
  width:100%; padding:10px; border-radius:12px; border:1px solid rgba(255,71,87,.25);
  background:rgba(255,71,87,.08); color:var(--red); font-size:13px; font-weight:700;
  font-family:'Cairo',sans-serif; cursor:pointer; transition:.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.logout-btn:hover { background:rgba(255,71,87,.15); }

/* Main Content */
#main-content {
  margin-right:260px; padding:24px; min-height:100vh;
  transition:margin .3s;
}
@media(max-width:800px) { #main-content { margin-right:0; } }

/* Top Bar */
#admin-topbar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px;
}
.admin-topbar-title { font-size:22px; font-weight:900; }
.admin-topbar-right { display:flex; align-items:center; gap:10px; }
.admin-refresh-btn {
  display:flex; align-items:center; gap:6px; padding:8px 16px;
  border-radius:12px; border:1px solid var(--border);
  background:rgba(255,255,255,.05); color:var(--text);
  font-size:12px; font-weight:700; font-family:'Cairo',sans-serif; cursor:pointer;
}
.admin-refresh-btn:hover { background:rgba(255,255,255,.08); }
#sidebar-toggle {
  display:none; width:36px; height:36px; border-radius:10px;
  background:rgba(255,255,255,.06); border:1px solid var(--border);
  align-items:center; justify-content:center; cursor:pointer; font-size:15px;
}
@media(max-width:800px) { #sidebar-toggle { display:flex; } }

/* Glass Card */
.glass-card {
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border);
  border-radius:var(--r); position:relative; overflow:hidden;
}
.glass-card::before {
  content:''; position:absolute; inset:0; border-radius:var(--r);
  background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%);
  pointer-events:none;
}

/* Stats Grid */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
.stat-card { padding:20px; }
.stat-card-icon { font-size:28px; margin-bottom:10px; display:block; }
.stat-card-val { font-family:'Orbitron',sans-serif; font-size:24px; font-weight:900; color:var(--gold); margin-bottom:4px; }
.stat-card-label { font-size:12px; color:var(--muted); }
.stat-card-change { font-size:11px; margin-top:6px; }
.stat-card-change.up   { color:var(--green); }
.stat-card-change.down { color:var(--red); }

/* Section Card */
.section-card { padding:20px; margin-bottom:20px; }
.section-title { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:800; margin-bottom:16px; }
.section-title i { color:var(--gold); }

/* Panel Grid */
.panel-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
@media(max-width:600px) { .panel-grid { grid-template-columns:1fr; } }

/* Form */
.form-group { margin-bottom:14px; }
.form-label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; display:block; }
.form-input {
  width:100%; padding:11px 14px; border-radius:12px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  color:var(--text); font-size:14px; font-family:'Cairo',sans-serif; outline:none;
  transition:border .2s;
}
.form-input:focus { border-color:rgba(255,215,0,.4); }
.form-input::placeholder { color:var(--muted); }
textarea.form-input { resize:vertical; min-height:80px; }

/* Buttons */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:10px 20px; border-radius:12px; border:none;
  font-family:'Cairo',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:.2s;
}
.btn:active { transform:scale(.96); }
.btn-primary { background:linear-gradient(135deg,var(--gold),#FFA500); color:#000; }
.btn-primary:hover { box-shadow:0 4px 20px rgba(255,215,0,.25); }
.btn-success { background:rgba(0,255,136,.15); border:1px solid rgba(0,255,136,.25); color:var(--green); }
.btn-danger  { background:rgba(255,71,87,.15);  border:1px solid rgba(255,71,87,.25);  color:var(--red); }
.btn-cyan    { background:rgba(0,245,255,.12);   border:1px solid rgba(0,245,255,.22);  color:var(--cyan); }
.btn-sm      { padding:6px 12px; font-size:12px; border-radius:8px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:var(--text); cursor:pointer; font-family:'Cairo',sans-serif; font-weight:700; }
.btn-full    { width:100%; }

/* Table */
.table-wrapper { overflow-x:auto; border-radius:12px; }
.admin-table {
  width:100%; border-collapse:collapse; min-width:600px;
}
.admin-table th {
  padding:12px 14px; text-align:right; font-size:11px; font-weight:700;
  color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
  background:rgba(255,255,255,.03); border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.admin-table td {
  padding:12px 14px; font-size:13px; border-bottom:1px solid rgba(255,255,255,.04);
  vertical-align:middle;
}
.admin-table tbody tr:hover { background:rgba(255,255,255,.02); }
.admin-table tbody tr:last-child td { border-bottom:none; }
.banned-row { background:rgba(255,71,87,.04); }
.mono { font-family:monospace; font-size:11px; color:var(--muted); }

/* Badges */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-active { background:rgba(0,255,136,.12); color:var(--green); border:1px solid rgba(0,255,136,.2); }
.badge-banned { background:rgba(255,71,87,.12);  color:var(--red);   border:1px solid rgba(255,71,87,.2); }
.badge-vip    { background:rgba(255,215,0,.12);   color:var(--gold);  border:1px solid rgba(255,215,0,.2); }

/* Gold Price Chart */
.price-display-big { font-family:'Orbitron',sans-serif; font-size:32px; font-weight:900; color:var(--gold); }
.price-mini-chart { height:60px; margin:10px 0; background:rgba(255,215,0,.03); border-radius:8px; }

/* Activity Feed */
.activity-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.activity-item:last-child { border-bottom:none; }
.activity-dot { width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; }
.activity-dot.gold   { background:var(--gold); }
.activity-dot.green  { background:var(--green); }
.activity-dot.red    { background:var(--red); }
.activity-dot.cyan   { background:var(--cyan); }
.activity-text  { font-size:13px; }
.activity-time  { font-size:10px; color:var(--muted); margin-top:2px; }

/* Search Bar */
.search-row {
  display:flex; gap:10px; align-items:center; margin-bottom:14px;
  flex-wrap:wrap;
}
.search-input {
  flex:1; min-width:160px; padding:9px 14px; border-radius:12px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  color:var(--text); font-size:13px; font-family:'Cairo',sans-serif; outline:none;
}
.search-input:focus { border-color:rgba(255,215,0,.35); }

/* Toast */
#admin-toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(12,18,36,.97); border:1px solid var(--border);
  backdrop-filter:blur(20px); padding:10px 24px; border-radius:30px;
  z-index:1000; font-size:13px; font-weight:600; white-space:nowrap;
  opacity:0; transition:all .3s; pointer-events:none;
}
#admin-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#admin-toast.success { border-color:rgba(0,255,136,.3); color:var(--green); }
#admin-toast.error   { border-color:rgba(255,71,87,.3);  color:var(--red); }

/* Loading */
.loading-row { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
.spin { animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Tabs */
.panel-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.panel-tab {
  padding:7px 16px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer; font-size:12px;
  font-weight:700; font-family:'Cairo',sans-serif; transition:.2s;
}
.panel-tab.active { background:rgba(255,215,0,.1); border-color:rgba(255,215,0,.25); color:var(--gold); }

/* Util */
.gold { color:var(--gold); }
.cyan { color:var(--cyan); }
.green{ color:var(--green);}
.red  { color:var(--red);  }
.muted{ color:var(--muted);}
.small{ font-size:11px; }
.text-center { text-align:center; }
.mt { margin-top:12px; }
.mb { margin-bottom:12px; }
</style>
</head>
<body>

<!-- ══ Login Screen ═══════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="fas fa-shield-halved"></i></div>
      <div class="login-title">QUINN ADMIN</div>
      <div class="login-sub">لوحة تحكم المسؤول · 2026</div>
    </div>
    <form id="admin-login-form">
      <label class="login-label">كلمة مرور المسؤول</label>
      <input type="password" class="login-input" id="admin-pass-input"
             placeholder="أدخل كلمة المرور" autocomplete="off">
      <button type="submit" class="login-btn">
        <i class="fas fa-right-to-bracket"></i> دخول للوحة التحكم
      </button>
    </form>
    <div id="login-error"></div>
    <div class="login-badge">
      <i class="fas fa-lock"></i>
      محمي بتشفير SSL · Quinn Bot 2026
    </div>
  </div>
</div>

<!-- ══ Dashboard ════════════════════════════ -->
<div id="dashboard">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="fas fa-coins"></i></div>
      <div>
        <div class="sidebar-title">QUINN ADMIN</div>
        <div class="sidebar-sub">لوحة التحكم الرئيسية</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">الرئيسية</div>
      <div class="sidebar-item active" data-section="overview">
        <i class="fas fa-chart-pie"></i> نظرة عامة
      </div>
      <div class="sidebar-item" data-section="users">
        <i class="fas fa-users"></i> إدارة المستخدمين
      </div>
      <div class="nav-section-label">الإدارة</div>
      <div class="sidebar-item" data-section="notifications">
        <i class="fas fa-bell"></i> الإشعارات
      </div>
      <div class="sidebar-item" data-section="gold">
        <i class="fas fa-coins"></i> سوق الذهب
      </div>
      <div class="sidebar-item" data-section="tokens">
        <i class="fas fa-paper-plane"></i> إرسال العملات
      </div>
      <div class="nav-section-label">النظام</div>
      <div class="sidebar-item" data-section="activity">
        <i class="fas fa-timeline"></i> سجل النشاط
      </div>
      <div class="sidebar-item" data-section="settings">
        <i class="fas fa-gear"></i> الإعدادات
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logout-btn">
        <i class="fas fa-right-from-bracket"></i> تسجيل الخروج
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="main-content">

    <!-- Topbar -->
    <div id="admin-topbar">
      <div>
        <div class="admin-topbar-title" id="page-title">نظرة عامة</div>
        <div class="muted small" id="page-sub">آخر تحديث: الآن</div>
      </div>
      <div class="admin-topbar-right">
        <button class="admin-refresh-btn" id="refresh-btn">
          <i class="fas fa-rotate-right"></i> تحديث
        </button>
        <div id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </div>

    <!-- Dynamic Content -->
    <div id="admin-content">
      <div class="loading-row"><i class="fas fa-spinner spin"></i> جاري التحميل...</div>
    </div>

  </main>
</div>

<!-- Toast -->
<div id="admin-toast"></div>

<script type="module">
import { db }  from './js/firebase.js';
import {
  collection, getDocs, doc, updateDoc, addDoc,
  query, orderBy, limit, getDoc, setDoc,
  serverTimestamp, increment, onSnapshot, where
} from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

const ADMIN_PASS = 'T9@xQ#4mL!2vZ$7pR';
let _authed  = false;
let _users   = [];
let _section = 'overview';

// ══ LOGIN ═══════════════════════════════════
document.getElementById('admin-login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const pass = document.getElementById('admin-pass-input').value;
  if (pass === ADMIN_PASS) {
    _authed = true;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'flex';
    loadSection('overview');
    bindSidebar();
    document.getElementById('refresh-btn').addEventListener('click', () => loadSection(_section));
    document.getElementById('logout-btn').addEventListener('click', () => location.reload());
  } else {
    const err = document.getElementById('login-error');
    err.textContent = '❌ كلمة مرور خاطئة';
    document.getElementById('admin-pass-input').value = '';
    setTimeout(() => err.textContent = '', 3000);
  }
});

// ══ SIDEBAR ═════════════════════════════════
function bindSidebar() {
  document.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      loadSection(item.dataset.section);
      // mobile: close sidebar
      document.getElementById('sidebar').classList.remove('open');
    });
  });
}

// ══ SECTIONS ════════════════════════════════
async function loadSection(name) {
  _section = name;
  const titles = { overview:'نظرة عامة', users:'إدارة المستخدمين', notifications:'الإشعارات', gold:'سوق الذهب', tokens:'إرسال العملات', activity:'سجل النشاط', settings:'الإعدادات' };
  document.getElementById('page-title').textContent = titles[name] || name;
  document.getElementById('page-sub').textContent   = `آخر تحديث: ${new Date().toLocaleTimeString('ar-SA')}`;

  const cnt = document.getElementById('admin-content');
  cnt.innerHTML = `<div class="loading-row"><i class="fas fa-spinner spin"></i> جاري التحميل...</div>`;

  switch (name) {
    case 'overview':      await renderOverview(cnt);     break;
    case 'users':         await renderUsers(cnt);        break;
    case 'notifications': renderNotifications(cnt);      break;
    case 'gold':          await renderGold(cnt);         break;
    case 'tokens':        await renderTokenSend(cnt);    break;
    case 'activity':      await renderActivity(cnt);     break;
    case 'settings':      renderSettings(cnt);           break;
  }
}

// ══ OVERVIEW ════════════════════════════════
async function renderOverview(cnt) {
  // تحميل إحصائيات
  let totalUsers=0, totalTokens=0, totalGold=0, totalClicks=0, bannedCount=0;
  try {
    const snap = await getDocs(collection(db,'users'));
    snap.forEach(d => {
      const u = d.data();
      totalUsers++;
      totalTokens += u.totalTokens || 0;
      totalGold   += u.goldGrams   || 0;
      totalClicks += u.clicks      || 0;
      if (u.banned) bannedCount++;
    });
    _users = snap.docs.map(d => ({id:d.id,...d.data()}));
  } catch (_) {}

  cnt.innerHTML = `

async function renderUsers(cnt) {

async function renderTokenSend(cnt) {
  cnt.innerHTML = `
    <div class="panel-grid">

        <div class="section-title"><i class="fas fa-paper-plane"></i> إرسال عملات لمستخدم</div>

        </div>
        <div class="form-group">
          <label class="form-label">سبب الإرسال</label>
          <input type="text" class="form-input" id="send-reason" placeholder="مكافأة، تعويض...">
        </div>
        <button class="btn btn-primary btn-full" id="do-send-tokens-btn">
          <i class="fas fa-coins"></i> إرسال العملات
        </button>
      </div>
      <div class="glass-card section-card">
        <div class="section-title"><i class="fas fa-broadcast-tower"></i> إرسال جماعي</div>
        <div class="form-group">
          <label class="form-label">الكمية لكل مستخدم</label>
          <input type="number" class="form-input" id="bulk-amount" placeholder="100" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">الشريحة المستهدفة</label>
          <select class="form-input" id="bulk-target">
            <option value="all">جميع المستخدمين</option>
            <option value="top10">أفضل 10 لاعبين</option>
            <option value="top50">أفضل 50 لاعب</option>
          </select>
        </div>
        <button class="btn btn-cyan btn-full" id="bulk-send-btn">
          <i class="fas fa-users"></i> إرسال للجميع
        </button>
        <div class="muted small mt">⚠️ هذه العملية لا يمكن التراجع عنها</div>
      </div>
    </div>`;

  document.getElementById('do-send-tokens-btn').addEventListener('click', async () => {
    const uid    = document.getElementById('send-uid')?.value?.trim();
    const amount = parseInt(document.getElementById('send-amount')?.value);
    const reason = document.getElementById('send-reason')?.value || '—';
    if (!uid || !amount || amount <= 0) { showToast('❌ أدخل البيانات بشكل صحيح','error'); return; }
    await sendTokensToUser(uid, amount, reason);
  });

  document.getElementById('bulk-send-btn').addEventListener('click', async () => {
    const amount = parseInt(document.getElementById('bulk-amount')?.value);
    const target = document.getElementById('bulk-target')?.value;
    if (!amount || amount <= 0) { showToast('❌ أدخل الكمية','error'); return; }
    if (!confirm(`إرسال ${amount} Quinn لـ (${target})؟`)) return;

    let targetUsers = _users;
    if (target === 'top10') targetUsers = _users.slice(0,10);
    if (target === 'top50') targetUsers = _users.slice(0,50);

    let done = 0;
    for (const u of targetUsers) {
      try {
        await updateDoc(doc(db,'users',u.id), { tokens:increment(amount), totalTokens:increment(amount) });
        done++;
      } catch (_) {}
    }
    showToast(`✅ تم الإرسال لـ ${done} مستخدم`);
    await addDoc(collection(db,'adminActivity'), { type:'bulk_send', amount, target, count:done, timestamp:serverTimestamp() });
  });
}

// ══ HELPERS ══════════════════════════════════
async function sendTokensToUser(uid, amount, reason) {
  try {
    await updateDoc(doc(db,'users',uid), { tokens:increment(amount), totalTokens:increment(amount) });
    await addDoc(collection(db,'adminActivity'), { type:'send_tokens', uid, amount, reason, timestamp:serverTimestamp() });
    showToast(`✅ تم إرسال ${fmtQ(amount)} Quinn للمستخدم`);
  } catch(e) { showToast('❌ '+e.message,'error'); }
}

window.promptSendTokens = async function(uid, name) {
  const amount = parseInt(prompt(`كم Quinn تريد إرسال لـ ${name}?`));
  if (amount > 0) await sendTokensToUser(uid, amount, 'admin_manual');
};

window.toggleBan = async function(uid, isBanned) {
  const msg = isBanned ? `فك حظر هذا المستخدم؟` : `حظر هذا المستخدم؟`;
  if (!confirm(msg)) return;
  try {
    await updateDoc(doc(db,'users',uid), { banned:!isBanned });
    await addDoc(collection(db,'adminActivity'), { type:'ban_toggle', uid, action:isBanned?'unban':'ban', timestamp:serverTimestamp() });
    showToast(isBanned ? '✅ تم فك الحظر' : '✅ تم حظر المستخدم');
    const u = _users.find(u => u.id === uid);
    if (u) u.banned = !isBanned;
    renderUsersTable(_users);
  } catch(e) { showToast('❌ '+e.message,'error'); }
};

window.loadSection = loadSection;

function showToast(msg, type='success') {
  const t = document.getElementById('admin-toast');
  t.textContent = msg;
  t.className   = type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function fmtQ(n) {
  n = Math.floor(n||0);
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}
