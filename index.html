<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quinn Bot 2026 | Future of Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white overflow-hidden select-none">
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Restricted Screen -->
    <div id="restriction-screen" class="fixed inset-0 z-[3000] hidden flex flex-col items-center justify-center bg-black/95 backdrop-blur-3xl p-10 text-center">
        <div class="relative w-32 h-32 mb-8">
            <div class="absolute inset-0 bg-red-500/20 blur-3xl animate-pulse"></div>
            <i data-lucide="shield-off" class="w-16 h-16 text-red-500 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
        </div>
        <h1 class="text-3xl font-black mb-4 bg-gradient-to-r from-white to-red-500 bg-clip-text text-transparent">الدخول مقيد</h1>
        <p class="text-white/50 mb-10 text-sm">يجب استخدام تطبيق تيليجرام الرسمي للوصول إلى محفظة كوين 2026.</p>
        <button onclick="window.location.reload()" class="px-12 py-5 bg-white text-black rounded-3xl font-black text-sm uppercase">تحديث</button>
    </div>

    <!-- Splash Loader -->
    <div id="loading-screen" class="fixed inset-0 z-[2000] flex flex-col items-center justify-center bg-black">
        <div class="relative w-32 h-32 mb-12 flex items-center justify-center">
            <div class="absolute inset-0 border-2 border-violet-500/10 rounded-full"></div>
            <div class="absolute inset-0 border-t-2 border-amber-500 rounded-full animate-spin"></div>
            <span class="text-5xl font-black text-amber-500">Q</span>
        </div>
        <div class="w-48 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="load-progress" class="h-full bg-gradient-to-r from-violet-600 to-amber-500 w-0 transition-all duration-300"></div>
        </div>
        <p class="mt-6 text-[10px] font-black tracking-[0.5em] text-white/40 uppercase">System Initializing v2.0.26</p>
    </div>

    <div id="app" class="relative z-10 flex flex-col h-screen opacity-0 transition-opacity duration-1000">
        <header class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-4 bg-white/5 p-2 pr-4 rounded-3xl backdrop-blur-xl border border-white/10">
                <div class="relative">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=Q&background=8b5cf6&color=fff" class="w-10 h-10 rounded-2xl object-cover border border-white/20">
                    <div id="verify-badge" class="absolute -bottom-1 -right-1 bg-amber-500 text-[6px] text-black font-black px-1 rounded-sm">✓</div>
                </div>
                <div>
                    <h2 id="display-name" class="text-xs font-black tracking-tight uppercase">Loading...</h2>
                    <p id="user-tier" class="text-[7px] text-violet-400 font-bold tracking-widest">VERIFIED-ID: 0000</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="bg-white/5 p-2 px-4 rounded-3xl backdrop-blur-xl border border-white/10 text-right">
                    <div id="main-balance" class="text-sm font-black">0.00 <span class="text-amber-500 text-[8px]">Q</span></div>
                </div>
                <button id="settings-btn" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-2xl border border-white/10">
                    <i data-lucide="settings" class="w-4 h-4 text-white/60"></i>
                </button>
            </div>
        </header>

        <main id="content-scroll" class="flex-1 overflow-y-auto px-6 pb-32">
            <div id="tab-content" class="w-full h-full"></div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md h-16 bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[30px] flex items-center justify-around px-2 z-50">
            <button class="nav-item active" data-tab="home"><i data-lucide="layout-grid"></i></button>
            <button class="nav-item" data-tab="wallet"><i data-lucide="wallet-2"></i></button>
            <button class="nav-item" data-tab="gold"><i data-lucide="trending-up"></i></button>
            <button class="nav-item" data-tab="games"><i data-lucide="swords"></i></button>
            <button class="nav-item" data-tab="stats"><i data-lucide="bar-chart-3"></i></button>
            <button class="nav-item" data-tab="ai"><i data-lucide="sparkles" class="text-amber-400"></i></button>
            <div id="nav-indicator" class="absolute bottom-1 h-1 w-6 bg-amber-500 rounded-full transition-all duration-300"></div>
        </nav>
    </div>

    <script type="module" src="app_main.js"></script>
</body>
</html>
