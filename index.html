<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Quinn Bot - الإصدار المستقر</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0818;
  --bg2: #110e2a;
  --purple: #8b5cf6;
  --blue: #3b82f6;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.12);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.5);
  --radius: 18px;
  --radius-sm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
}
.bg-mesh {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(circle at 20% 30%, rgba(139,92,246,0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 70%, rgba(59,130,246,0.1) 0%, transparent 50%);
}
#app {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.header {
  padding: 10px 16px;
  background: rgba(10,8,24,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.content {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 90px;
}
.glass {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
}
.glass-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
}
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,8,24,0.92);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--glass-border);
  display: flex;
  padding: 8px 0 16px;
  z-index: 999;
}
.nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  padding: 4px 0;
  transition: transform 0.15s;
}
.nav-btn:active { transform: scale(0.9); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 10px; font-family: 'Cairo', sans-serif; color: rgba(255,255,255,0.3); }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 8px var(--purple)); }
.nav-btn.active .nav-label { color: #a78bfa; font-weight: 700; }
.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #8b5cf6, #3b82f6);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: transform 0.1s;
}
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm {
  padding: 8px 14px;
  background: rgba(139,92,246,0.7);
  border-radius: 10px;
  color: white;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  border: none;
}
.inp {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  outline: none;
}
.inp:focus { border-color: #8b5cf6; }
#coin-btn {
  width: 180px; height: 180px;
  border-radius: 50%;
  background: linear-gradient(135deg, #8b5cf6, #3b82f6);
  border: 3px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 40px rgba(139,92,246,0.6);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 75px;
  transition: transform 0.08s;
  margin: 0 auto;
}
#coin-btn:active { transform: scale(0.93); }
.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.stat-row { display: flex; gap: 10px; margin-bottom: 14px; }
.stat-box {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
}
.stat-val { font-size: 18px; font-weight: 900; }
.stat-lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
.sub-tab {
  white-space: nowrap;
  padding: 9px 16px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
}
.sub-tab.active {
  border-color: #8b5cf6;
  background: rgba(139,92,246,0.2);
  color: #c4b5fd;
}
.tx-item {
  display: flex; justify-content: space-between;
  padding: 12px;
  background: rgba(255,255,255,0.04);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}
.avatar-item {
  border-radius: 14px;
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  transition: all 0.2s;
  position: relative;
}
.avatar-item.selected { border-color: #8b5cf6; background: rgba(139,92,246,0.2); }
.avatar-item.taken { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.5); }
.avatar-item:active { transform: scale(0.95); }
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin-bottom: 20px; }
.podium-item { flex: 1; text-align: center; }
.podium-stand {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px 10px 0 0;
  padding: 8px;
}
#notif {
  position: fixed;
  top: 70px; left: 50%; transform: translateX(-50%);
  z-index: 9998;
  padding: 10px 20px;
  border-radius: 12px;
  background: #1e1b2e;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  font-weight: bold;
  display: none;
  white-space: nowrap;
}
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 10000;
  align-items: center;
  justify-content: center;
}
.modal.active { display: flex; }
.modal-content {
  background: #1a1635;
  border-radius: 20px;
  padding: 24px;
  max-width: 90%;
  text-align: center;
}
.modal-btns {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.modal-btns button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
.modal-btns button.cancel { background: rgba(255,255,255,0.1); color: white; }
.modal-btns button.confirm { background: #8b5cf6; color: white; }
</style>
</head>
<body>
<div id="notif"></div>
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <div class="modal-title" id="confirmTitle">تأكيد</div>
    <p id="confirmMsg"></p>
    <div class="modal-btns">
      <button class="cancel" onclick="closeConfirm()">إلغاء</button>
      <button class="confirm" onclick="confirmAction()">تأكيد</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <div id="hdr-avatar" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:#1e1b2e;border:2px solid #8b5cf6" onclick="showTab('profile')"></div>
      <div><div id="hdr-name" style="font-weight:700"></div><div id="hdr-level" style="font-size:11px;color:#aaa"></div></div>
    </div>
    <div style="text-align:left"><div id="hdr-quinn" style="font-weight:900"></div><div id="hdr-tokens" style="font-size:11px;color:#aaa"></div></div>
  </div>
  <div class="content">
    <!-- الصفحة الرئيسية -->
    <div id="tab-home" class="tab-content active">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val" id="s-tokens">0</div><div class="stat-lbl">🪙 التوكن</div></div>
        <div class="stat-box"><div class="stat-val" id="s-quinn">0</div><div class="stat-lbl">💎 Quinn</div></div>
        <div class="stat-box"><div class="stat-val" id="s-clicks">0</div><div class="stat-lbl">👆 نقرات</div></div>
      </div>
      <div class="glass-card" style="padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between"><span id="lvl-name"></span><span id="lvl-next" style="font-size:12px"></span></div>
        <div class="progress-bar" style="margin-top:6px"><div id="lvl-bar" class="progress-fill" style="width:0%"></div></div>
      </div>
      <div id="boost-banner" style="display:none;background:#f59e0b20;border:1px solid #f59e0b;border-radius:12px;padding:10px;text-align:center;margin-bottom:14px"></div>
      <div style="display:flex;justify-content:center;margin:20px 0"><button id="coin-btn" onclick="handleClick(event)">💎</button></div>
      <div class="glass-card" style="padding:12px">
        <div style="display:flex;justify-content:space-between"><span>⚡ الطاقة</span><span id="energy-txt"></span></div>
        <div class="progress-bar" style="margin-top:6px"><div id="energy-bar" class="progress-fill" style="width:100%"></div></div>
      </div>
      <div class="glass-card" style="padding:12px;margin-top:12px;display:flex;justify-content:space-between"><span>💰 الدخل السلبي</span><span id="passive-txt">0</span></div>
    </div>

    <!-- المحفظة -->
    <div id="tab-wallet" class="tab-content">
      <div class="glass" style="padding:20px;text-align:center;margin-bottom:16px">
        <div>الرصيد الكلي</div>
        <div id="w-quinn" style="font-size:36px;font-weight:900"></div>
        <div id="w-tokens" style="font-size:12px"></div>
        <div style="font-size:11px;margin-top:8px">10,000 توكن = 1 Quinn</div>
      </div>
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="showWalletSub('overview',this)">نظرة عامة</button>
        <button class="sub-tab" onclick="showWalletSub('send',this)">إرسال</button>
        <button class="sub-tab" onclick="showWalletSub('receive',this)">استقبال</button>
        <button class="sub-tab" onclick="showWalletSub('shop',this)">متجر</button>
      </div>
      <div id="w-overview"><div id="tx-list"></div></div>
      <div id="w-send" style="display:none">
        <div class="glass-card" style="padding:20px">
          <input class="inp" id="sendTo" placeholder="@username أو المعرف الرقمي" style="margin-bottom:12px">
          <input class="inp" id="sendAmt" type="number" placeholder="الكمية (Quinn)" style="margin-bottom:12px">
          <button class="btn-primary" onclick="requestTransfer()">إرسال 💎</button>
        </div>
      </div>
      <div id="w-receive" style="display:none">
        <div class="glass-card" style="padding:20px;text-align:center">
          <div style="font-size:50px">📱</div>
          <div style="margin:10px 0">معرف الاستقبال</div>
          <div id="recvId" style="background:#00000030;padding:8px;border-radius:10px;font-weight:bold"></div>
          <button class="btn-primary" style="margin-top:14px" onclick="copyReceiveId()">نسخ المعرف</button>
        </div>
      </div>
      <div id="w-shop" style="display:none">
        <div class="glass-card" style="padding:20px">
          <input class="inp" id="shopQty" type="number" placeholder="كمية Quinn" style="margin-bottom:12px">
          <input class="inp" id="shopPass" type="password" placeholder="كلمة المرور" style="margin-bottom:12px">
          <button class="btn-primary" onclick="buyFromShop()">شراء 💎</button>
        </div>
      </div>
    </div>

    <!-- التعزيزات -->
    <div id="tab-boost" class="tab-content">
      <div class="sub-tabs"><button class="sub-tab active" onclick="showBoostSub('boosts',this)">تعزيزات</button><button class="sub-tab" onclick="showBoostSub('tasks',this)">مهام</button><button class="sub-tab" onclick="showBoostSub('passive',this)">سلبي</button></div>
      <div id="b-boosts"><div id="boostsList"></div></div>
      <div id="b-tasks" style="display:none"><div id="tasksList"></div></div>
      <div id="b-passive" style="display:none"><div id="passiveList"></div></div>
    </div>

    <!-- المتصدرين -->
    <div id="tab-leaderboard" class="tab-content">
      <div id="podiumContainer"></div>
      <div id="leaderboardList"></div>
    </div>

    <!-- الإحالات -->
    <div id="tab-referral" class="tab-content">
      <div class="glass" style="padding:20px;text-align:center">
        <div>🏆 كود الإحالة الخاص بك</div>
        <div id="refCodeDisplay" style="background:#00000040;padding:10px;border-radius:12px;margin:12px 0;font-weight:bold;font-size:18px"></div>
        <button class="btn-primary" onclick="copyRefCode()">نسخ الكود</button>
        <button class="btn-primary" style="margin-top:10px" onclick="shareReferralLink()">🔗 مشاركة الرابط</button>
        <div style="margin-top:16px">👥 عدد الإحالات: <span id="refCount">0</span></div>
        <div>💰 أرباح الإحالات: <span id="refEarnings">0</span> توكن</div>
      </div>
      <div id="referralsList" style="margin-top:16px"></div>
    </div>

    <!-- الملف الشخصي -->
    <div id="tab-profile" class="tab-content">
      <div class="glass" style="padding:20px;text-align:center">
        <div id="profAvatar" style="font-size:64px"></div>
        <div id="profName" style="font-size:20px;font-weight:900"></div>
        <div id="profUsername" style="font-size:12px;color:#aaa"></div>
        <div class="stat-row" style="margin-top:16px">
          <div class="stat-box"><div id="profQuinn">0</div><div>Quinn</div></div>
          <div class="stat-box"><div id="profClicks">0</div><div>نقرة</div></div>
          <div class="stat-box"><div id="profLevelIcon">🌱</div><div>المستوى</div></div>
        </div>
      </div>
      <div class="sub-tabs"><button class="sub-tab active" onclick="showProfileSub('info',this)">معلومات</button><button class="sub-tab" onclick="showProfileSub('avatar',this)">الصورة</button><button class="sub-tab" onclick="showProfileSub('verify',this)">توثيق</button></div>
      <div id="p-info"><div id="infoList"></div></div>
      <div id="p-avatar" style="display:none"><div id="avatarGrid" class="avatar-grid"></div></div>
      <div id="p-verify" style="display:none"><div id="verifyPanel"></div></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showTab('home')"><span class="nav-icon">🏠</span><span class="nav-label">الرئيسية</span></button>
    <button class="nav-btn" onclick="showTab('boost')"><span class="nav-icon">⚡</span><span class="nav-label">التعزيزات</span></button>
    <button class="nav-btn" onclick="showTab('wallet')"><span class="nav-icon">💼</span><span class="nav-label">المحفظة</span></button>
    <button class="nav-btn" onclick="showTab('leaderboard')"><span class="nav-icon">🏆</span><span class="nav-label">المتصدرون</span></button>
    <button class="nav-btn" onclick="showTab('referral')"><span class="nav-icon">👥</span><span class="nav-label">الإحالات</span></button>
    <button class="nav-btn" onclick="showTab('profile')"><span class="nav-icon">👤</span><span class="nav-label">ملفي</span></button>
  </nav>
</div>

<script>
// ===================== الإعدادات الثابتة =====================
const BOT_USERNAME = 'Quinnofficialbot'; // اسم البوت الخاص بك
const SHOP_PASSWORD = 'T9@xQ#4mL!2vZ$7pR';
const TOKENS_PER_QUINN = 10000;
const MAX_ENERGY = 1000;
const REF_BONUS = 5000;
const VERIFY_COST = 50; // Quinn
const SECOND_LIFE_COST = 30; // Quinn

const AVATARS = [
  {id:1,emoji:'🦁',name:'الأسد',color:'#f59e0b'},{id:2,emoji:'🐯',name:'النمر',color:'#ef4444'},
  {id:3,emoji:'🦊',name:'الثعلب',color:'#f97316'},{id:4,emoji:'🐺',name:'الذئب',color:'#9ca3af'},
  {id:5,emoji:'🦅',name:'النسر',color:'#3b82f6'},{id:6,emoji:'🐉',name:'التنين',color:'#8b5cf6'},
  {id:7,emoji:'🦋',name:'الفراشة',color:'#ec4899'},{id:8,emoji:'🐬',name:'الدلفين',color:'#06b6d4'},
  {id:9,emoji:'🦄',name:'اليونيكورن',color:'#a855f7'},{id:10,emoji:'🐸',name:'الضفدع',color:'#22c55e'}
];

const LEVELS = [
  {name:'مبتدئ',icon:'🌱',min:0,max:10000},
  {name:'محترف',icon:'⚡',min:10000,max:50000},
  {name:'خبير',icon:'🔥',min:50000,max:200000},
  {name:'أسطورة',icon:'💎',min:200000,max:1000000},
  {name:'إله',icon:'👑',min:1000000,max:Infinity}
];

const BOOSTS = [
  {id:'turbo',name:'توربو',desc:'×5 نقرة',cost:500,icon:'⚡',duration:30000},
  {id:'magnet',name:'مغناطيس',desc:'+3 توكن/0.5ث',cost:1000,icon:'🧲',duration:60000},
  {id:'shield',name:'درع',desc:'لا تستهلك طاقة',cost:300,icon:'🛡️',duration:60000}
];

const TASKS = [
  {id:1,name:'انقر 100 مرة',reward:500,target:100,icon:'👆'},
  {id:2,name:'انقر 500 مرة',reward:1500,target:500,icon:'🖱️'},
  {id:3,name:'انقر 1000 مرة',reward:3000,target:1000,icon:'💥'},
  {id:4,name:'ادعُ صديقاً',reward:5000,type:'referral',icon:'👥'},
  {id:5,name:'وثّق حسابك',reward:10000,type:'verify',icon:'✅'}
];

const PASSIVE_ITEMS = [
  {id:'farm',name:'مزرعة صغيرة',rate:10,cost:50000,icon:'🌱'},
  {id:'factory',name:'مصنع',rate:50,cost:200000,icon:'🏭'},
  {id:'complex',name:'مجمع',rate:200,cost:800000,icon:'🏗️'},
  {id:'server',name:'خادم تعدين',rate:1000,cost:5000000,icon:'🖥️'}
];

// ===================== الحالة العامة =====================
let currentUser = null;
let allUsers = {};  // كل المستخدمين { userId: data }
let pendingConfirm = null;

// دوال مساعدة
function fmt(n) { if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return Math.floor(n).toString(); }
function toQuinn(t) { return (t/TOKENS_PER_QUINN).toFixed(2); }
function toTokens(q) { return q * TOKENS_PER_QUINN; }
function getLevel(tokens) { return LEVELS.find(l => tokens>=l.min && tokens<l.max) || LEVELS[0]; }
function getAvatar(id) { return AVATARS.find(a=>a.id===id) || AVATARS[0]; }
function notify(msg, type='info') { let el=document.getElementById('notif'); el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',2500); }
function haptic(t='light') { window.Telegram?.WebApp?.HapticFeedback?.impactOccurred(t); }

// حفظ كل البيانات
function saveAll() { localStorage.setItem('quinn_all_users', JSON.stringify(allUsers)); }

// تحميل أو إنشاء مستخدم
function loadUser(telegramUser) {
  let uid = String(telegramUser.id);
  if(!allUsers[uid]) {
    let newUser = {
      id: uid,
      name: (telegramUser.first_name||'') + ' ' + (telegramUser.last_name||''),
      username: telegramUser.username || '',
      tokens: 1000,
      clicks: 0,
      energy: MAX_ENERGY,
      passiveIncome: 0,
      boostActive: null,
      boostEnd: 0,
      completedTasks: [],
      transactions: [],
      avatar: 1,
      verified: false,
      verifyExpire: 0,
      secondLife: false,
      secondLifeExpire: 0,
      referralCode: `REF${uid.slice(-6)}`,
      referrals: [],
      referralEarnings: 0,
      ownedPassive: {}
    };
    newUser.transactions.push({desc:'🎁 مكافأة التسجيل',amount:1000,time:new Date().toLocaleTimeString()});
    allUsers[uid] = newUser;
    saveAll();
    // معالجة الإحالة إذا دخل عبر رابط
    let startParam = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
    if(startParam && startParam.startsWith('ref_')) {
      let refCode = startParam.replace('ref_','');
      let referrerId = Object.keys(allUsers).find(id => allUsers[id].referralCode === refCode);
      if(referrerId && referrerId !== uid && !allUsers[uid].referralProcessed) {
        allUsers[uid].referralProcessed = true;
        allUsers[referrerId].tokens += REF_BONUS;
        allUsers[referrerId].referralEarnings += REF_BONUS;
        allUsers[referrerId].referrals.push({name:newUser.name, bonus:REF_BONUS, date:new Date().toLocaleString()});
        allUsers[referrerId].transactions.unshift({desc:`إحالة: ${newUser.name}`, amount:REF_BONUS, time:new Date().toLocaleTimeString()});
        saveAll();
        notify(`تمت إضافة ${fmt(REF_BONUS)} توكن من الإحالة!`, 'success');
      }
    }
  }
  let user = allUsers[uid];
  // التحقق من انتهاء التوثيق
  if(user.verified && user.verifyExpire && Date.now() > user.verifyExpire) {
    user.verified = false;
    user.transactions.unshift({desc:'انتهى التوثيق الشهري', amount:0, time:new Date().toLocaleTimeString()});
    saveAll();
  }
  if(user.secondLife && user.secondLifeExpire && Date.now() > user.secondLifeExpire) {
    user.secondLife = false;
    saveAll();
  }
  return user;
}

// النقر على العملة
function handleClick(e) {
  if(currentUser.boostActive !== 'shield' && currentUser.energy <= 0) { notify('لا طاقة! انتظر قليلاً', 'error'); return; }
  let mult = (currentUser.boostActive === 'turbo') ? 5 : 1;
  let gain = mult;
  currentUser.tokens += gain;
  currentUser.clicks++;
  if(currentUser.boostActive !== 'shield') currentUser.energy = Math.max(0, currentUser.energy-1);
  // تأثير الجسيم
  let x = e.clientX, y = e.clientY;
  let particle = document.createElement('div');
  particle.className = 'particle';
  particle.innerText = `+${gain}`;
  particle.style.position = 'fixed';
  particle.style.left = x+'px';
  particle.style.top = y+'px';
  particle.style.fontSize = '24px';
  particle.style.fontWeight = 'bold';
  particle.style.color = '#fbbf24';
  particle.style.pointerEvents = 'none';
  particle.style.zIndex = '9999';
  document.body.appendChild(particle);
  setTimeout(()=>particle.remove(), 800);
  refreshUI();
  checkTasks();
  saveAll();
}

function checkTasks() {
  TASKS.forEach(task => {
    if(currentUser.completedTasks.includes(task.id)) return;
    if(task.target && currentUser.clicks >= task.target) {
      completeTask(task.id);
    }
    if(task.type === 'referral' && currentUser.referrals.length > 0 && !currentUser.completedTasks.includes(task.id)) completeTask(task.id);
    if(task.type === 'verify' && currentUser.verified && !currentUser.completedTasks.includes(task.id)) completeTask(task.id);
  });
}

function completeTask(taskId) {
  if(currentUser.completedTasks.includes(taskId)) return;
  let task = TASKS.find(t=>t.id===taskId);
  if(!task) return;
  currentUser.tokens += task.reward;
  currentUser.completedTasks.push(taskId);
  currentUser.transactions.unshift({desc:`مهمة: ${task.name}`, amount:task.reward, time:new Date().toLocaleTimeString()});
  notify(`🎉 أنجزت "${task.name}" وربحت +${fmt(task.reward)} توكن`);
  refreshUI();
  saveAll();
}

// المحفظة والتحويلات
function requestTransfer() {
  let to = document.getElementById('sendTo').value.trim();
  let amt = parseFloat(document.getElementById('sendAmt').value);
  if(!to || isNaN(amt) || amt<=0) { notify('بيانات غير صحيحة','error'); return; }
  let costTokens = toTokens(amt);
  if(currentUser.tokens < costTokens) { notify('رصيد غير كاف','error'); return; }
  showConfirm('تأكيد التحويل', `إرسال ${amt} Quinn إلى ${to}؟`, () => {
    let targetId = null;
    if(to.startsWith('@')) {
      let uname = to.slice(1);
      targetId = Object.keys(allUsers).find(uid => allUsers[uid].username === uname);
    } else {
      targetId = to;
    }
    if(!targetId || !allUsers[targetId]) { notify('المستخدم غير موجود','error'); return; }
    if(targetId === currentUser.id) { notify('لا يمكن التحويل لنفسك','error'); return; }
    currentUser.tokens -= costTokens;
    allUsers[targetId].tokens += costTokens;
    currentUser.transactions.unshift({desc:`إرسال ${amt} Quinn إلى ${to}`, amount:-costTokens, time:new Date().toLocaleTimeString()});
    allUsers[targetId].transactions.unshift({desc:`استلام ${amt} Quinn من ${currentUser.name}`, amount:costTokens, time:new Date().toLocaleTimeString()});
    saveAll();
    notify(`تم الإرسال بنجاح ✅`, 'success');
    refreshUI();
    if(document.getElementById('tab-wallet').classList.contains('active')) renderWallet();
  });
}

  setInterval(() => { if(currentUser.energy < MAX_ENERGY) { currentUser.energy = Math.min(MAX_ENERGY, currentUser.energy+3); refreshUI(); saveAll(); } }, 1500);
  setInterval(() => { if(currentUser.passiveIncome > 0) { currentUser.tokens += currentUser.passiveIncome; currentUser.transactions.unshift({desc:'دخل سلبي', amount:currentUser.passiveIncome, time:new Date().toLocaleTimeString()}); refreshUI(); saveAll(); } }, 60000);
  setInterval(() => { if(currentUser.boostActive === 'magnet' && Date.now() < currentUser.boostEnd) { currentUser.tokens += 3; refreshUI(); saveAll(); } }, 500);
  setInterval(() => { if(currentUser.boostActive && Date.now() > currentUser.boostEnd) { currentUser.boostActive = null; refreshUI(); renderBoosts(); saveAll(); } }, 1000);
}

// بدء التشغيل
function init() {
  let tg = window.Telegram?.WebApp;
  let user;
  if(tg) { tg.ready(); tg.expand(); user = tg.initDataUnsafe?.user; if(!user) user = {id: Date.now(), first_name:'زائر'}; }
  else user = {id: 'guest'+Date.now(), first_name:'تجريبي'};
  let stored = localStorage.getItem('quinn_all_users');
  if(stored) allUsers = JSON.parse(stored); else allUsers = {};
  currentUser = loadUser(user);
  refreshUI();
  startTimers();
  // عرض التبويب الأول
  showTab('home');
}
window.addEventListener('DOMContentLoaded', init);
</script>
