  import { getDatabase, ref, set, get, update, onValue, push, serverTimestamp, runTransaction, increment } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDYyxW9P-_DlOEqK6FCQqqBWo5UFxGnshY",
    authDomain: "quinnbot-9f797.firebaseapp.com",
    databaseURL: "https://quinnbot-9f797-default-rtdb.firebaseio.com",
    projectId: "quinnbot-9f797",

    appId: "1:592205334333:web:9f8a3b6ec7e7fee81fa754",
    measurementId: "G-W5HRWB45GX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ═══════════════════════════════════════════
  // FIREBASE MANAGER - إدارة البيانات بكفاءة
  // ═══════════════════════════════════════════
  window.FB = {
    db,
    _cache: {},
    _cacheTime: {},
    CACHE_TTL: 30000,

    isCacheValid(key) { /* ... نفس الكود السابق ... */ return this._cache[key] !== undefined && (Date.now() - (this._cacheTime[key] || 0)) < this.CACHE_TTL; },
    setCache(key, val) { this._cache[key] = val; this._cacheTime[key] = Date.now(); },
    clearCache(key) { delete this._cache[key]; delete this._cacheTime[key]; },
    async read(path) { if (this.isCacheValid(path)) return this._cache[path]; const snap = await get(ref(db, path)); const val = snap.val(); this.setCache(path, val); return val; },
    async write(path, data) { await set(ref(db, path), data); this.setCache(path, data); },
    async patch(path, data) { await update(ref(db, path), data); this.clearCache(path); },
    async batchUpdate(updates) { await update(ref(db, '/'), updates); Object.keys(updates).forEach(k => this.clearCache(k)); },
    listen(path, cb) { const r = ref(db, path); return onValue(r, snap => cb(snap.val())); },
    async updateGoldMarket(action, amount) { /* ... نفس الكود السابق ... */ const marketRef = ref(db, 'goldMarket'); return runTransaction(marketRef, (market) => { if (!market) market = { price: 100, volume: 0, lastUpdate: 0 }; const impact = Math.min(amount / 10000, 5); if (action === 'buy') { market.price = Math.min(market.price * (1 + impact * 0.01), 500); market.buyVolume = (market.buyVolume || 0) + amount; } else { market.price = Math.max(market.price * (1 - impact * 0.01), 10); market.sellVolume = (market.sellVolume || 0) + amount; } market.volume = (market.volume || 0) + amount; market.lastUpdate = Date.now(); return market; }); },
    async findOrCreateGamblingMatch(userId, betAmount, userTokens) { /* ... نفس الكود السابق ... */ const waitingRef = ref(db, 'gambling/waiting'); const snap = await get(waitingRef); const waiting = snap.val(); if (waiting && waiting.userId !== userId) { const matchId = push(ref(db, 'gambling/matches')).key; const updates = {}; updates[`gambling/matches/${matchId}`] = { player1: waiting.userId, player2: userId, bet1: waiting.betAmount, bet2: betAmount, totalPot: waiting.betAmount + betAmount, status: 'rolling', createdAt: Date.now() }; updates['gambling/waiting'] = null; await update(ref(db, '/'), updates); return { type: 'match', matchId, opponent: waiting.userId, opponentBet: waiting.betAmount }; } else { await set(waitingRef, { userId, betAmount, timestamp: Date.now() }); return { type: 'waiting' }; } },
    async rollGamblingDice(matchId) { /* ... نفس الكود السابق ... */ const matchRef = ref(db, `gambling/matches/${matchId}`); return runTransaction(matchRef, (match) => { if (!match || match.status !== 'rolling') return match; match.dice1 = Math.floor(Math.random() * 6) + 1; match.dice2 = Math.floor(Math.random() * 6) + 1; match.winner = match.dice1 > match.dice2 ? match.player1 : match.dice2 > match.dice1 ? match.player2 : 'tie'; match.status = 'finished'; return match; }); }
  };

<script>
'use strict';

// ════════════════════════════════════════════════
// STATE - حالة التطبيق المركزية (محدثة)
// ════════════════════════════════════════════════
const STATE = {
  userId: null, username: 'Quinn Player', coins: 0, totalCoins: 0, energy: 1000, maxEnergy: 1000,
  tapPower: 1, level: 1, xp: 0, rank: 'المبتدئ', referrals: 0, passiveIncome: 0, gold: 0, goldAvgBuy: 0,
  ownedAvatars: ['👤'], ownedFrames: [], currentAvatar: '👤', transactions: [], joinDate: Date.now(),
  secureKey: null, // سيتم تعبئته من قاعدة البيانات
  _saveTimer: null, _dirty: false
};

// ... (بقية المتغيرات العامة والثوابت كما هي: RANKS, LEVEL_XP, إلخ) ...

// ════════════════════════════════════════════════
// دوال إدارة المفتاح الخاص والجلسة
// ════════════════════════════════════════════════
const SECURE_KEY_PREFIX = 'QNN-';
const SESSION_STORAGE_KEY = 'quinn_session';

function generateSecureKey() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
  let key = '';
  for (let i = 0; i < 4; i++) {
    if (i > 0) key += '-';
    for (let j = 0; j < 4; j++) key += chars[Math.floor(Math.random() * chars.length)];
  }
  return SECURE_KEY_PREFIX + key.substring(4); // QNN-XXXX-XXXX-XXXX
}

async function getOrCreateSecureKey(uid) {
  if (!window._fbReady) return null;
  const userRef = `users/${uid}`;
  let userData = await window.FB.read(userRef);
  if (!userData) return null;
  
  if (!userData.secureKey) {
    const newKey = generateSecureKey();
    await window.FB.patch(userRef, { secureKey: newKey });
    userData.secureKey = newKey;
  }
  STATE.secureKey = userData.secureKey;
  return userData.secureKey;
}

function saveSession(userId) {
  const session = { uid: userId, ts: Date.now() };
  localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(session));
}

function getSavedSession() {
  const raw = localStorage.getItem(SESSION_STORAGE_KEY);
  if (!raw) return null;
  try {
    const session = JSON.parse(raw);
    // الجلسة صالحة لمدة 30 يومًا
    if (Date.now() - session.ts < 30 * 24 * 60 * 60 * 1000) return session;
  } catch(e) {}
  return null;
}

function clearSession() {
  localStorage.removeItem(SESSION_STORAGE_KEY);
}

// ════════════════════════════════════════════════
// دوال تسجيل الدخول الجديدة
// ════════════════════════════════════════════════
async function loginWithSecureKey() {
  const input = document.getElementById('secure-key-input');
  const key = input.value.trim().toUpperCase();
  const errorEl = document.getElementById('login-error');
  
  if (!key.startsWith('QNN-') || key.length < 15) {
    errorEl.textContent = '⚠️ صيغة المفتاح غير صحيحة';
    return;
  }

  errorEl.textContent = '⏳ جاري التحقق...';
  
  try {
    if (!window._fbReady) throw new Error('Firebase غير جاهز');
    
    // البحث عن المستخدم صاحب هذا المفتاح
    const users = await window.FB.read('users');
    let foundUid = null;
    if (users) {
      for (const [uid, u] of Object.entries(users)) {
        if (u.secureKey === key) { foundUid = uid; break; }
      }
    }
    
    if (!foundUid) {
      errorEl.textContent = '❌ مفتاح غير صالح أو غير موجود';
      return;
    }
    
    // تحميل بيانات المستخدم
    const userData = await window.FB.read(`users/${foundUid}`);
    if (!userData) throw new Error('بيانات المستخدم غير موجودة');
    
    // تهيئة الحالة
    STATE.userId = foundUid;
    Object.assign(STATE, userData);
    STATE.secureKey = key;
    
    // حفظ الجلسة
    saveSession(foundUid);
    
    // إخفاء شاشة الدخول وإظهار التطبيق
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    // تحديث واجهة المستخدم
    initAppUI();
    showToast(`✅ أهلاً بعودتك ${STATE.username}`);
    
  } catch (e) {
    console.error(e);
    errorEl.textContent = '❌ حدث خطأ، حاول مجدداً';
  }
}

async function attemptSilentLogin() {
  const session = getSavedSession();
  if (!session) return false;
  
  try {
    if (!window._fbReady) return false;
    const userData = await window.FB.read(`users/${session.uid}`);
    if (!userData) { clearSession(); return false; }
    
    STATE.userId = session.uid;
    Object.assign(STATE, userData);
    
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initAppUI();
    showToast(`👋 أهلاً بعودتك ${STATE.username}`);
    return true;
  } catch(e) {
    clearSession();
    return false;
  }
}

// ════════════════════════════════════════════════
// دوال تهيئة التطبيق (محدثة)

  document.getElementById('avatar-img').textContent = STATE.currentAvatar;
  document.getElementById('profile-avatar-big').textContent = STATE.currentAvatar;
  
  if (STATE.secureKey) {
    document.getElementById('user-secure-key-display').textContent = STATE.secureKey;
  }
  
  updateEnergy();
  updateRankUI();
  refreshShop();
  
  // بدء المستمعات الخاصة بالسوق والذهب
  if (window._fbReady) {
    // ... أي إعدادات Firebase إضافية ...
  }
}

function copySecureKey() {
  if (STATE.secureKey) {
    navigator.clipboard?.writeText(STATE.secureKey);
    showToast('✅ تم نسخ المفتاح الخاص');
  }
}

// ════════════════════════════════════════════════
// نقطة البداية الرئيسية (تم تعديلها بالكامل)
// ════════════════════════════════════════════════
async function bootstrap() {
  // انتظر تجهيز Firebase
  if (!window._fbReady) {
    await new Promise(resolve => document.addEventListener('firebaseReady', resolve, { once: true }));
  }

  // 1. تحقق من وجود Telegram WebApp
  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    tg.setHeaderColor('#030712');
    tg.setBackgroundColor('#030712');
    
    const tgUser = tg.initDataUnsafe?.user || {};
    const userId = tgUser.id?.toString() || 'tg_' + Date.now();
    const username = tgUser.first_name || tgUser.username || 'Quinn Player';
    
    STATE.userId = userId;
    STATE.username = username;
    
    // تحقق من وجود المستخدم في Firebase، وإنشائه إذا لزم الأمر
    let userData = await window.FB.read(`users/${userId}`);
    if (!userData) {
      // مستخدم جديد
      const newKey = generateSecureKey();
      userData = {
        username, coins: 1000, totalCoins: 1000, energy: 1000, maxEnergy: 1000,
        tapPower: 1, level: 1, xp: 0, gold: 0, goldAvgBuy: 0, referrals: 0, passiveIncome: 0,
        ownedAvatars: ['👤'], ownedFrames: [], currentAvatar: '👤', transactions: [],
        joinDate: Date.now(), secureKey: newKey, walletId: generateWalletId()
      };
      await window.FB.write(`users/${userId}`, userData);
    } else {
      // تأكد من وجود secureKey
      if (!userData.secureKey) {
        userData.secureKey = generateSecureKey();
        await window.FB.patch(`users/${userId}`, { secureKey: userData.secureKey });
      }
    }
    
    Object.assign(STATE, userData);
    STATE.userId = userId;
    STATE.secureKey = userData.secureKey;
    
    // احفظ الجلسة للاستخدام الخارجي المحتمل
    saveSession(userId);
    
    // اعرض التطبيق
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initAppUI();
    
    // عرض المفتاح الخاص للمستخدم إذا كان جديدًا أو عند الطلب
    // يمكن إظهار تنبيه أو إضافة زر في الملف الشخصي
  } 
  else {
    // 2. خارج تيليجرام - جرب الدخول الصامت
    const silentSuccess = await attemptSilentLogin();
    if (!silentSuccess) {
      // عرض شاشة تسجيل الدخول
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  }
}

// ابدأ التطبيق
bootstrap();

// ... (باقي الدوال المساعدة والتحكم بالألعاب والمحفظة والسوق... تبقى كما هي مع تعديل طفيف: تأكد من أن STATE.userId معرف قبل أي عملية كتابة)
</script>
</body>
</html>
