<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030712">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Quinn Bot 2026</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  
  <style>
    /* ===== المتغيرات الأساسية ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-0: #030712;
      --bg-1: #0a0f1c;
      --bg-2: #111827;
      --gold: #FFD700;
      --cyan: #00F5FF;
      --purple: #9B59B6;
      --red: #FF4757;
      --green: #00FF88;
      --text: #F3F4F6;
      --muted: #9CA3AF;
      --border: rgba(255, 255, 255, 0.06);
      --r-sm: 10px;
      --r-lg: 20px;
    }
    
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-0);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
      width: 100%;
      position: fixed;
    }
    
    /* ===== شاشة التحميل ===== */
    #boot-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .boot-logo { position: relative; width: 100px; height: 100px; }
    .boot-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid rgba(255,215,0,.12);
      border-top-color: var(--gold);
      animation: spin 1.2s linear infinite;
    }
    .boot-ring-2 {
      position: absolute; inset: 10px; border-radius: 50%;
      border: 2px solid rgba(0,245,255,.1);
      border-bottom-color: var(--cyan);
      animation: spin 2s linear infinite reverse;
    }
    .boot-core {
      position: absolute; inset: 20px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,.15), rgba(255,215,0,.03));
      border: 1px solid rgba(255,215,0,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--gold);
    }
    .boot-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px; font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: 3px;
    }
    .boot-year { font-size: 12px; color: var(--muted); letter-spacing: 4px; }
    .boot-progress {
      width: 160px; height: 3px; background: rgba(255,255,255,.06);
      border-radius: 2px; overflow: hidden;
    }
    .boot-progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--cyan));
      border-radius: 2px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(255,215,0,.4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ===== شاشة تيليجرام فقط ===== */
    #tg-only-screen {
      position: fixed; inset: 0; z-index: 9998;
      background: var(--bg-0);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px; text-align: center;
    }
    .tg-only-icon { font-size: 72px; color: #0088CC; margin-bottom: 8px; }
    .tg-only-title { font-size: 20px; font-weight: 800; color: var(--text); }
    .tg-only-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .tg-open-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px; border-radius: 16px;
      background: linear-gradient(135deg, #0088CC, #005580);
      color: white; font-size: 15px; font-weight: 800;
      text-decoration: none; font-family: 'Cairo', sans-serif;
      box-shadow: 0 4px 20px rgba(0,136,204,.3);
    }
    
    /* ===== شاشة الحظر ===== */
    #banned-screen {
      position: fixed; inset: 0; z-index: 9998;
      background: var(--bg-0);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px; text-align: center;
    }
    
    /* ===== App Shell ===== */
    #app-shell {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      opacity: 0; transition: opacity 0.4s ease;
    }
    #app-shell.visible { opacity: 1; }
    
    /* Header */
    #app-header {
      height: 64px; flex-shrink: 0;
      background: rgba(8,12,25,.92);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 14px; gap: 10px;
      position: relative;
    }
    #app-header::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,.3), rgba(0,245,255,.25), transparent);
    }
    .hdr-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,215,0,.12), rgba(0,245,255,.08));
      border: 2px solid rgba(255,215,0,.35);
      box-shadow: 0 0 12px rgba(255,215,0,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: var(--gold);
      flex-shrink: 0; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .hdr-avatar img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0; border-radius: 50%;
    }
    .hdr-info { flex: 1; min-width: 0; }
    .hdr-name { font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr-rank { font-size: 10px; font-weight: 700; }
    .hdr-right { display: flex; align-items: center; gap: 8px; }
    .hdr-bal-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,215,0,.08); border: 1px solid rgba(255,215,0,.2);
      border-radius: 20px; padding: 5px 11px; cursor: pointer;
    }
    #hdr-balance {
      font-family: 'Orbitron', sans-serif; font-size: 12px;
      font-weight: 700; color: var(--gold);
    }
    #hdr-notif-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; position: relative;
    }
    #notif-badge {
      position: absolute; top: 5px; right: 5px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 6px var(--red);
      display: none; animation: pulseAnim 2s infinite;
    }
    @keyframes pulseAnim { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
    
    /* Connection bar */
    #conn-bar {
      display: none; padding: 6px 14px; font-size: 11px; font-weight: 700;
      text-align: center; flex-shrink: 0;
    }
    #conn-bar.offline { display: block; background: rgba(255,71,87,.15); color: var(--red); border-bottom: 1px solid rgba(255,71,87,.2); }
    #conn-bar.online  { display: block; background: rgba(0,255,136,.1);  color: var(--green); }
    
    /* Tab content */
    #tab-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 12px 13px calc(80px + env(safe-area-inset-bottom));
      position: relative;
    }
    
    /* Bottom Nav */
    #bottom-nav {
      height: calc(64px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(6,10,22,.93);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-around;
      flex-shrink: 0; position: relative; z-index: 20;
    }
    #bottom-nav::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,.2), rgba(0,245,255,.2), transparent);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 8px 2px;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; font-family: 'Cairo', sans-serif;
      border-radius: 12px; transition: all 0.22s; position: relative;
    }
    .nav-icon { font-size: 19px; transition: transform 0.22s, color 0.22s; display: block; }
    .nav-label { font-size: 8.5px; font-weight: 700; white-space: nowrap; transition: color 0.22s; }
    .nav-btn.active .nav-icon { transform: translateY(-4px) scale(1.18); color: var(--gold); }
    .nav-btn.active .nav-label { color: var(--gold); }
    .nav-btn.active::after {
      content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      width: 22px; height: 3px; border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), var(--cyan));
      box-shadow: 0 0 8px rgba(255,215,0,.5);
    }
    
    /* ===== كروت زجاجية ===== */
    .glass-card {
      background: rgba(18, 25, 45, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--r-lg);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .xp-bar {
      height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 4px; margin: 8px 0;
      overflow: hidden;
    }
    .xp-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--cyan));
      border-radius: 4px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #FFC312);
      border: none; padding: 12px 24px; border-radius: 40px;
      font-weight: 800; color: #0a0f1c; cursor: pointer;
      font-family: 'Cairo', sans-serif; font-size: 14px;
      box-shadow: 0 4px 12px rgba(255,215,0,0.2);
      width: 100%;
    }
  </style>
</head>
<body>

<!-- شاشة التحميل -->
<div id="boot-screen">
  <div class="boot-logo">
    <div class="boot-ring"></div>
    <div class="boot-ring-2"></div>
    <div class="boot-core"><i class="fas fa-coins"></i></div>
  </div>
  <div class="boot-name">QUINN</div>
  <div class="boot-year">BOT · 2026</div>
  <div class="boot-progress">
    <div class="boot-progress-fill" id="boot-fill"></div>
  </div>
</div>

<!-- شاشة تيليجرام فقط -->
<div id="tg-only-screen">
  <i class="fas fa-telegram tg-only-icon"></i>
  <div class="tg-only-title">يعمل فقط داخل تيليجرام</div>
  <div class="tg-only-sub">Quinn Bot هو تطبيق مصغّر يعمل حصرياً داخل تطبيق تيليجرام.</div>
  <a href="https://t.me/Quinnofficialbot" class="tg-open-btn">
    <i class="fab fa-telegram"></i> فتح في تيليجرام
  </a>
</div>

<!-- شاشة الحظر -->
<div id="banned-screen">
  <i class="fas fa-ban" style="font-size:72px;color:var(--red)"></i>
  <h2 style="font-size:20px;font-weight:800;color:var(--red)">تم حظر حسابك</h2>
  <p style="color:var(--muted);font-size:14px;">تم حظر حسابك من استخدام Quinn Bot.</p>
  <a href="https://t.me/Quinnofficialbot" class="tg-open-btn" style="background:rgba(255,71,87,.2);border:1px solid rgba(255,71,87,.3);">
    <i class="fas fa-headset"></i> تواصل مع الدعم
  </a>
</div>

<!-- التطبيق الرئيسي -->
<div id="app-shell">
  <header id="app-header">
    <div class="hdr-avatar" id="hdr-avatar">
      <span id="hdr-avatar-letter">Q</span>
    </div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name">Quinn Player</div>
      <div class="hdr-rank" id="hdr-rank">🌙 الحالم</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-bal-pill">
        <i class="fas fa-coins" style="font-size:12px;color:var(--gold)"></i>
        <span id="hdr-balance">0</span>
      </div>
      <div id="hdr-notif-btn">
        <i class="fas fa-bell" style="font-size:14px"></i>
        <div id="notif-badge"></div>
      </div>
    </div>
  </header>
  
  <div id="conn-bar"></div>
  
  <main id="tab-content"></main>
  
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="home"><i class="fas fa-house nav-icon"></i><span class="nav-label">الرئيسية</span></button>
    <button class="nav-btn" data-tab="vault"><i class="fas fa-vault nav-icon"></i><span class="nav-label">الخزانة</span></button>
    <button class="nav-btn" data-tab="exchange"><i class="fas fa-chart-line nav-icon"></i><span class="nav-label">التداول</span></button>
    <button class="nav-btn" data-tab="arena"><i class="fas fa-gamepad nav-icon"></i><span class="nav-label">الساحة</span></button>
    <button class="nav-btn" data-tab="leaderboard"><i class="fas fa-trophy nav-icon"></i><span class="nav-label">المتصدرون</span></button>
    <button class="nav-btn" data-tab="profile"><i class="fas fa-user-circle nav-icon"></i><span class="nav-label">الملف</span></button>
  </nav>
</div>

<script>
  (function(){
    "use strict";
    
    // ---------- دوال مساعدة ----------
    const delay = ms => new Promise(r => setTimeout(r, ms));
    
    // ---------- تعريف الرتب ----------
    const RANKS = [
      { name: 'الحالم',      icon: '🌙', minXP: 0 },
      { name: 'المبتدئ',     icon: '🌱', minXP: 100 },
      { name: 'المحارب',     icon: '⚔️', minXP: 500 },
      { name: 'الخبير',      icon: '🛡️', minXP: 1500 },
      { name: 'الحكيم',      icon: '📜', minXP: 3000 },
      { name: 'الأسطورة',    icon: '👑', minXP: 6000 }
    ];
    
    function getRank(xp) {
      for (let i = RANKS.length - 1; i >= 0; i--) {
        if (xp >= RANKS[i].minXP) return RANKS[i];
      }
      return RANKS[0];
    }
    
    function getLevelProgress(xp) {
      let level = 1;
      let xpForLevel = 100;
      while (xp >= xpForLevel) {
        xp -= xpForLevel;
        level++;
        xpForLevel = Math.floor(xpForLevel * 1.5);
      }
      return { level, currentXP: xp, nextXP: xpForLevel };
    }
    
    // ---------- إدارة المستخدم ----------
    class AppUser {
      constructor(data) {
        this.id = data.id;
        this.first_name = data.first_name || 'لاعب';
        this.username = data.username || '';
        this.balance = data.balance || 1000;
        this.xp = data.xp || 0;
        this.banned = data.banned || false;
        this.energy = data.energy || 100;
      }
      
      static load(tgUser) {
        // تحميل من localStorage للتجربة
        const key = `quinn_user_${tgUser.id}`;
        const saved = localStorage.getItem(key);
        let data;
        if (saved) {
          try { data = JSON.parse(saved); } catch(e){ data = {}; }
        } else {
          data = {};
        }
        // دمج بيانات تيليجرام
        const user = new AppUser({
          id: tgUser.id,
          first_name: tgUser.first_name || data.first_name || 'Quinn',
          username: tgUser.username || data.username || 'player',
          balance: data.balance || 1000,
          xp: data.xp || 0,
          banned: data.banned || false,
          energy: data.energy || 100
        });
        user.save();
        return user;
      }
      
      save() {
        const key = `quinn_user_${this.id}`;
        localStorage.setItem(key, JSON.stringify({
          balance: this.balance,
          xp: this.xp,
          banned: this.banned,
          energy: this.energy
        }));
      }
    }
    
    // ---------- المتغيرات العامة ----------
    let currentUser = null;
    let activeTab = 'home';
    
    const tg = window.Telegram?.WebApp;
    const isTelegramEnv = !!(tg && tg.initData && tg.initData.length > 0);
    const isDevMode = window.location.hostname === 'localhost' || window.location.search.includes('dev');
    
    // ---------- واجهة المستخدم ----------
    const bootScreen = document.getElementById('boot-screen');
    const tgOnlyScreen = document.getElementById('tg-only-screen');
    const bannedScreen = document.getElementById('banned-screen');
    const appShell = document.getElementById('app-shell');
    const tabContent = document.getElementById('tab-content');
    const bootFill = document.getElementById('boot-fill');
    
    // تحديث الهيدر
    function updateHeader() {
      if (!currentUser) return;
      document.getElementById('hdr-name').textContent = currentUser.first_name;
      document.getElementById('hdr-balance').textContent = Math.floor(currentUser.balance).toLocaleString();
      const rank = getRank(currentUser.xp);
      document.getElementById('hdr-rank').textContent = `${rank.icon} ${rank.name}`;
      document.getElementById('hdr-avatar-letter').textContent = currentUser.first_name.charAt(0).toUpperCase();
    }
    
    // تحميل التبويبات
    function renderHome() {
      const rank = getRank(currentUser.xp);
      const { level, currentXP, nextXP } = getLevelProgress(currentUser.xp);
      const percent = (currentXP / nextXP) * 100;
      
      tabContent.innerHTML = `
        <div class="glass-card" style="text-align:center;">
          <i class="fas fa-home" style="font-size:32px;color:var(--gold);margin-bottom:12px;"></i>
          <h2>مرحباً ${currentUser.first_name}!</h2>
          <p style="margin:12px 0;">💰 الرصيد: <strong style="color:var(--gold);">${Math.floor(currentUser.balance).toLocaleString()}</strong> عملة</p>
          <div style="margin:16px 0;">
            <div>🏆 المستوى ${level} - ${rank.name}</div>
            <div class="xp-bar"><div class="xp-fill" style="width:${percent}%;"></div></div>
            <small>${currentXP} / ${nextXP} XP</small>
          </div>
          <button class="btn-primary" onclick="alert('قريباً: مكافأة يومية')">🎁 احصل على مكافأة</button>
        </div>
        <div class="glass-card">
          <h3><i class="fas fa-fire"></i> نشاط اليوم</h3>
          <p style="color:var(--muted);">لم تبدأ أي مهمة بعد.</p>
        </div>
      `;
    }
    
    function renderVault() {
      tabContent.innerHTML = `
        <div class="glass-card">
          <h3><i class="fas fa-vault"></i> الخزانة</h3>
          <p>إجمالي الأصول: <strong>${Math.floor(currentUser.balance).toLocaleString()}</strong> عملة</p>
          <p style="color:var(--muted);margin-top:16px;">ميزة قيد التطوير...</p>
        </div>
      `;
    }
    
    function renderExchange() {
      tabContent.innerHTML = `
        <div class="glass-card">
          <h3><i class="fas fa-chart-line"></i> التداول</h3>
          <p>سعر QUIZZ: 0.042$ <span style="color:var(--green);">+2.4%</span></p>
          <div style="height:150px;background:rgba(0,0,0,0.2);border-radius:12px;margin:16px 0;display:flex;align-items:center;justify-content:center;color:var(--muted);">
            📊 مخطط بياني
          </div>
          <button class="btn-primary" onclick="alert('قريباً')">شراء / بيع</button>
        </div>
      `;
    }
    
    function renderArena() {
      tabContent.innerHTML = `
        <div class="glass-card">
          <h3><i class="fas fa-gamepad"></i> ساحة الألعاب</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;">
            <div class="glass-card" style="padding:16px;text-align:center;" onclick="alert('Pulse Check')">
              <i class="fas fa-heartbeat" style="font-size:24px;color:var(--red);"></i>
              <div>Pulse Check</div>
            </div>
            <div class="glass-card" style="padding:16px;text-align:center;" onclick="alert('Cipher Break')">
              <i class="fas fa-key" style="font-size:24px;color:var(--gold);"></i>
              <div>Cipher Break</div>
            </div>
            <div class="glass-card" style="padding:16px;text-align:center;" onclick="alert('Chart Oracle')">
              <i class="fas fa-chart-bar" style="font-size:24px;color:var(--cyan);"></i>
              <div>Chart Oracle</div>
            </div>
            <div class="glass-card" style="padding:16px;text-align:center;" onclick="alert('Rekt Miner')">
              <i class="fas fa-digging" style="font-size:24px;color:var(--purple);"></i>
              <div>Rekt Miner</div>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderLeaderboard() {
      tabContent.innerHTML = `
        <div class="glass-card">
          <h3><i class="fas fa-trophy"></i> المتصدرون</h3>
          <ol style="margin-top:16px;list-style-position:inside;">
            <li>🐋 WhaleMaster — 1.2M XP</li>
            <li>💎 CryptoQueen — 980K XP</li>
            <li>⚡ FlashTrader — 750K XP</li>
          </ol>
          <p style="margin-top:16px;color:var(--muted);">ترتيبك: #42</p>
        </div>
      `;
    }
    
    function renderProfile() {
      const rank = getRank(currentUser.xp);
      tabContent.innerHTML = `
        <div class="glass-card" style="text-align:center;">
          <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--cyan));margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#000;">
            ${currentUser.first_name.charAt(0).toUpperCase()}
          </div>
          <h3>${currentUser.first_name}</h3>
          <p style="color:var(--muted);">@${currentUser.username}</p>
          <div style="display:flex;justify-content:center;gap:24px;margin:20px 0;">
            <div><strong>${rank.name}</strong><br><small>الرتبة</small></div>
            <div><strong>${Math.floor(currentUser.balance).toLocaleString()}</strong><br><small>الرصيد</small></div>
          </div>
          <button class="btn-primary" onclick="alert('تسجيل الخروج')">🚪 تسجيل الخروج</button>
        </div>
      `;
    }
    
    const tabRenderers = {
      home: renderHome,
      vault: renderVault,
      exchange: renderExchange,
      arena: renderArena,
      leaderboard: renderLeaderboard,
      profile: renderProfile
    };
    
    function switchTab(tabId) {
      if (!currentUser) return;
      activeTab = tabId;
      
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      
      const renderer = tabRenderers[tabId];
      if (renderer) renderer();
      else tabContent.innerHTML = '<p>قيد الإنشاء</p>';
      
      updateHeader();
    }
    
    // ---------- مراقبة الاتصال ----------
    function initConnectionWatcher() {
      const bar = document.getElementById('conn-bar');
      function update() {
        if (navigator.onLine) {
          bar.className = 'online';
          bar.innerHTML = '<i class="fas fa-circle" style="font-size:8px;"></i> متصل';
          setTimeout(() => bar.classList.remove('online'), 2000);
        } else {
          bar.className = 'offline';
          bar.innerHTML = '<i class="fas fa-exclamation-triangle"></i> غير متصل';
        }
      }
      window.addEventListener('online', update);
      window.addEventListener('offline', update);
      update();
    }
    
    // ---------- بدء التشغيل ----------
    async function boot() {
      // تحريك شريط التحميل
      let progress = 0;
      const interval = setInterval(() => {
        progress += 5;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
        }
        bootFill.style.width = progress + '%';
      }, 30);
      
      await delay(800);
      
      // التحقق من البيئة
      if (!isTelegramEnv && !isDevMode) {
        bootScreen.style.display = 'none';
        tgOnlyScreen.style.display = 'flex';
        return;
      }
      
      // تهيئة تيليجرام
      if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#030712');
        tg.setBackgroundColor('#030712');
      }
      
      // بيانات المستخدم
      const tgUser = tg?.initDataUnsafe?.user || {
        id: 'demo_' + Date.now().toString(36),
        first_name: 'حمودة',
        username: 'hamoudawaheed'
      };
      
      currentUser = AppUser.load(tgUser);
      
      // فحص الحظر
      if (currentUser.banned) {
        bootScreen.style.display = 'none';
        bannedScreen.style.display = 'flex';
        return;
      }
      
      // إخفاء شاشة التحميل وإظهار التطبيق
      bootScreen.style.display = 'none';
      appShell.classList.add('visible');
      
      // تهيئة الأحداث
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
      
      document.getElementById('hdr-avatar').addEventListener('click', () => switchTab('profile'));
      document.getElementById('hdr-notif-btn').addEventListener('click', () => alert('لا توجد إشعارات جديدة'));
      
      initConnectionWatcher();
      switchTab('home');
      
      // حفظ دوري
      setInterval(() => {
        if (currentUser) currentUser.save();
      }, 10000);
      
      window.addEventListener('beforeunload', () => {
        if (currentUser) currentUser.save();
      });
    }
    
    // تشغيل
    boot().catch(err => {
      console.error('Boot error:', err);
      bootScreen.innerHTML = `<div style="color:var(--red);">خطأ: ${err.message}</div>`;
    });
    
  })();
</script>
</body>
</html>
