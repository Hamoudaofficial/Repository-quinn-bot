<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quinn Bot 2026 | Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#050505] text-white overflow-hidden font-sans">
    <!-- Orbs Background Field -->
    <div id="orbs-container" class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
        <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
        <div class="orb orb-4"></div><div class="orb orb-5"></div><div class="orb orb-6"></div>
        <div class="orb orb-7"></div>
    </div>

    <!-- Identity Verification Portal -->
    <div id="auth-screen" class="fixed inset-0 z-[1000] bg-black/60 backdrop-blur-[40px] flex items-center justify-center p-8 hidden">
        <div class="w-full max-w-md space-y-10 text-center">
            <div class="relative w-40 h-40 mx-auto group">
                <div class="absolute inset-0 bg-amber-500/30 rounded-full blur-3xl animate-pulse"></div>
                <div class="relative w-full h-full bg-black/40 border border-white/10 rounded-full flex items-center justify-center backdrop-blur-xl shadow-2xl transition-transform group-active:scale-95">
                    <span class="text-6xl font-black text-amber-500 drop-shadow-[0_0_15px_rgba(245,158,11,0.8)]">Q</span>
                </div>
            </div>
            <div class="space-y-4">
                <h1 class="text-3xl font-black tracking-tight" data-i18n="gateway_title">QUINN SECURE PORTAL</h1>
                <p class="text-gray-400 text-sm" data-i18n="auth_desc">Verification Required to Access Assets</p>
            </div>
            <div class="space-y-4 max-w-sm mx-auto">
                <input type="text" id="secure-key-input" placeholder="QNN-XXXX-XXXX-XXXX" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-center font-mono text-amber-500 text-lg focus:outline-none focus:border-amber-500 transition-all uppercase">
                <button id="login-btn" class="w-full bg-amber-500 text-black font-black py-5 rounded-2xl neo-press text-sm uppercase tracking-widest" data-i18n="login">Enter Matrix</button>
            </div>
        </div>
    </div>

    <!-- Main Shell -->
    <main id="app-shell" class="h-screen flex flex-col relative overflow-hidden transition-all duration-700 blur-2xl pointer-events-none">
        <header class="p-4 flex flex-col gap-3 glass-header z-50">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3 cursor-pointer" id="profile-trigger">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-amber-400 to-amber-900 p-[1.5px] neo-press">
                        <img id="user-avatar" src="" class="w-full h-full rounded-[14px] bg-black" alt="P">
                    </div>
                    <div>
                        <h2 id="user-name" class="text-sm font-bold truncate max-w-[120px]">User</h2>
                        <div class="flex items-center gap-1">
                            <span id="rank-name" class="text-[9px] font-bold text-amber-500 uppercase tracking-tighter">Dreamer</span>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-[9px] text-gray-500 uppercase" data-i18n="balance">Assets</div>
                    <div class="flex items-center gap-1 font-mono text-xl font-black" id="main-balance">
                        <span id="balance-value">0.00</span>
                        <span class="text-amber-500 text-xs">QNN</span>
                    </div>
                </div>
            </div>
        </header>

        <section id="content-screen" class="flex-1 overflow-y-auto pb-32 p-4 custom-scrollbar">
            <!-- Dynamic Injection -->
        </section>

        <nav class="fixed bottom-6 left-4 right-4 h-18 glass-nav rounded-[28px] flex items-center justify-between px-4 z-50">
            <button data-tab="home" class="nav-btn active"><i data-lucide="home"></i></button>
            <button data-tab="wallet" class="nav-btn"><i data-lucide="wallet"></i></button>
            <button data-tab="exchange" class="nav-btn"><i data-lucide="line-chart"></i></button>
            <button data-tab="arena" class="nav-btn active-center"><i data-lucide="swords"></i></button>
            <button data-tab="vault" class="nav-btn"><i data-lucide="landmark"></i></button>
            <button data-tab="leaderboard" class="nav-btn"><i data-lucide="trophy"></i></button>
            <button data-tab="settings" class="nav-btn"><i data-lucide="layout-grid"></i></button>
        </nav>
    </main>

    <div id="overlay-container" class="fixed inset-0 z-[1100] hidden flex items-center justify-center p-4 backdrop-blur-3xl bg-black/70">
        <div id="modal-card" class="w-full max-w-md rounded-[32px] overflow-hidden"></div>
    </div>

    <script type="module" src="app_main.js"></script>
</body>
</html>
