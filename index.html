<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quinn Bot 2026 | Next-Gen AI Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#050505] text-white overflow-hidden font-sans">
    <!-- 7 Orbs Background Field -->
    <div id="orbs-container" class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
        <div class="orb orb-6"></div>
        <div class="orb orb-7"></div>
    </div>

    <!-- Login/Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-2xl flex items-center justify-center p-8 hidden">
        <div class="w-full max-w-md space-y-8 text-center">
            <div class="w-24 h-24 bg-amber-500 rounded-3xl mx-auto flex items-center justify-center shadow-[0_0_50px_rgba(245,158,11,0.3)]">
                <i data-lucide="shield-check" class="w-12 h-12 text-black"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold tracking-tight">QUINN SECURE</h1>
                <p class="text-gray-400 mt-2" data-i18n="auth_desc">أدخل مفتاحك الخاص للوصول إلى أصولك</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="secure-key-input" placeholder="QNN-XXXX-XXXX-XXXX" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-center font-mono text-amber-500 focus:outline-none focus:border-amber-500 transition-all">
                <button id="login-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl neo-press" data-i18n="login">تسجيل الدخول</button>
            </div>
            <p class="text-[10px] text-gray-600 uppercase tracking-widest">End-to-End Encrypted Node v4.2.0</p>
        </div>
    </div>

    <!-- App Shell -->
    <main id="app-shell" class="h-screen flex flex-col relative overflow-hidden blur-xl">
        
        <!-- Smart Header -->
        <header class="p-4 flex flex-col gap-3 glass-header z-50">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3 cursor-pointer" id="profile-trigger">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-amber-400 to-amber-700 p-[1.5px] neo-press relative">
                        <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Quinn" class="w-full h-full rounded-[11px] bg-black" alt="Profile">
                        <div class="absolute -top-1 -right-1 w-4 h-4 bg-blue-500 rounded-full border-2 border-black flex items-center justify-center">
                            <i data-lucide="check" class="w-2 h-2 text-white"></i>
                        </div>
                    </div>
                    <div>
                        <h2 id="user-name" class="text-sm font-bold">...</h2>
                        <div id="user-rank-badge" class="text-[10px] bg-white/10 px-2 py-0.5 rounded-full flex items-center gap-1">
                            <span id="rank-name" class="text-amber-400">...</span>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <div class="text-[10px] text-gray-400" data-i18n="balance">إجمالي الأصول</div>
                    <div class="flex items-center gap-1 font-mono text-lg font-bold" id="main-balance">
                        <span id="balance-value">0</span>
                        <span class="text-amber-500 text-xs">QNN</span>
                    </div>
                </div>
            </div>
            
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                <input type="text" id="global-search" data-i18n-placeholder="search_placeholder" 
                    placeholder="البحث في النظام..."
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-xs focus:outline-none focus:border-amber-500/50 transition-all">
            </div>
        </header>

        <!-- Dynamic Content -->
        <section id="content-screen" class="flex-1 overflow-y-auto pb-28 p-4 space-y-4 custom-scrollbar">
            <!-- Content Injected via JS -->
        </section>

        <!-- 7 Tab Navigation -->
        <nav class="fixed bottom-6 left-4 right-4 h-16 glass-nav rounded-[24px] flex items-center justify-around px-2 z-50">
            <button data-tab="home" class="nav-btn active"><i data-lucide="home"></i></button>
            <button data-tab="wallet" class="nav-btn"><i data-lucide="wallet-2"></i></button>
            <button data-tab="exchange" class="nav-btn"><i data-lucide="bar-chart-3"></i></button>
            <button data-tab="arena" class="nav-btn active-center"><i data-lucide="swords"></i></button>
            <button data-tab="vault" class="nav-btn"><i data-lucide="lock"></i></button>
            <button data-tab="leaderboard" class="nav-btn"><i data-lucide="award"></i></button>
            <button data-tab="settings" class="nav-btn"><i data-lucide="settings-2"></i></button>
        </nav>
    </main>

    <!-- Global Modal/Overlay -->
    <div id="overlay-container" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-2xl bg-black/60">
        <div id="modal-card" class="glass-card w-full max-w-sm p-0 rounded-[32px] overflow-hidden transform transition-all duration-300">
            <!-- Profile ID Card UI is usually injected here -->
        </div>
    </div>

    <script type="module" src="app_main.js"></script>
</body>
</html>
